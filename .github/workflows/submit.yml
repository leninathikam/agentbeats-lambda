name: Submit Solution

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      role:
        description: 'Role to submit'
        required: true
        default: 'attacker'
        type: choice
        options:
          - attacker
          - defender
          - both

jobs:
  submit-attacker:
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && (github.event.inputs.role == 'attacker' || github.event.inputs.role == 'both')) || contains(github.event.head_commit.message, '[submit]') || contains(github.event.head_commit.message, '[submit-attacker]')

    steps:
      - uses: actions/checkout@v4

      - name: Submit Attacker
        uses: LambdaLabsML/agentbeats-submission-action@main
        with:
          api_key: ${{ secrets.COMPETITION_API_KEY }}
          role: 'attacker'
          submission_path: './scenarios/security_arena/agents/attacker'
          run_tests: 'false'
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          openai_base_url: ${{ secrets.OPENAI_BASE_URL }}

  submit-defender:
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && (github.event.inputs.role == 'defender' || github.event.inputs.role == 'both')) || contains(github.event.head_commit.message, '[submit]') || contains(github.event.head_commit.message, '[submit-defender]')

    steps:
      - uses: actions/checkout@v4

      - name: Submit Defender
        uses: LambdaLabsML/agentbeats-submission-action@main
        with:
          api_key: ${{ secrets.COMPETITION_API_KEY }}
          role: 'defender'
          submission_path: './scenarios/security_arena/agents/defender'
          run_tests: 'false'
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          openai_base_url: ${{ secrets.OPENAI_BASE_URL }}